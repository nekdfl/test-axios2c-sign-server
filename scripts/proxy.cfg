# Прокси для HTTP(S) в скриптах скачивания (Python: openvsx / VSCodium; bash+curl в scripts/linux).
# Переопределить путь к файлу: переменная окружения VSCODIUM_PROXY_CFG.
#
# use_proxy=true — трафик через address; false — прямой доступ (прокси не задаётся).
use_proxy=false

# Формат: http://<user>:<password>@host:port  (без user:password — http://host:port)
address=http://user:password@proxy.example.com:8080
